<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astrobiologia</title>
  <meta name="description" content="Um espaço de divulgação científica sobre astrobiologia, microrganismos, ambientes extremos e vida no universo.">

  <link rel="stylesheet" href="{{ '/assets/css/redesign.css?v=401' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/redesign-solar.css?v=401' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/redesign-navigation.css?v=999' | relative_url }}">
</head>

<body class="redesign-home">
  <canvas id="space-background" aria-hidden="true"></canvas>

  <nav class="astro-side-nav" aria-label="Navegação principal">
    <button
      class="astro-side-nav__trigger"
      type="button"
      aria-label="Abrir menu"
      aria-expanded="false"
      aria-controls="astro-side-nav-panel"
    >
      <span class="astro-side-nav__trigger-icon" aria-hidden="true"></span>
    </button>

    <div class="astro-side-nav__overlay" aria-hidden="true"></div>

    <aside id="astro-side-nav-panel" class="astro-side-nav__panel" aria-hidden="true">
      <button class="astro-side-nav__close" type="button" aria-label="Fechar menu">
        <span class="astro-side-nav__close-icon" aria-hidden="true"></span>
      </button>

      <div class="astro-side-nav__brand">
        <span class="astro-side-nav__brand-small">Divulgação científica</span>
        <span class="astro-side-nav__brand-title">Astrobiologia</span>
      </div>

      <div class="astro-side-nav__menu">
        <a class="astro-side-nav__link" href="/">Início</a>
        <a class="astro-side-nav__link" href="/noticias/">Notícias</a>
        <a class="astro-side-nav__link" href="/noticias/">Posts</a>
      </div>
    </aside>
  </nav>

  <main class="redesign-home__main">
    <section class="redesign-solar-hero" aria-label="Sistema solar">
      <div id="redesign-solar-system" class="redesign-solar-system"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="{{ '/assets/js/redesign-background.js?v=401' | relative_url }}"></script>
  <script src="{{ '/assets/js/redesign-solar.js?v=401' | relative_url }}"></script>
  <script src="{{ '/assets/js/redesign-navigation.js?v=999' | relative_url }}"></script>
  <script>
    window.addEventListener("load", function () {
      var nav = document.querySelector(".astro-side-nav");
      var trigger = document.querySelector(".astro-side-nav__trigger");
      var panel = document.querySelector(".astro-side-nav__panel");
      var overlay = document.querySelector(".astro-side-nav__overlay");

      console.log("[SideNav inline fallback]", {
        nav: !!nav,
        trigger: !!trigger,
        panel: !!panel,
        overlay: !!overlay
      });

      if (!nav || !trigger || !panel) return;

      if (nav.dataset.sideNavReady === "true" || trigger.dataset.sideNavBound === "true") {
        console.log("[SideNav inline fallback] menu externo já inicializado");
        return;
      }

      trigger.addEventListener("click", function () {
        console.log("[SideNav inline fallback] clique detectado");
        nav.classList.toggle("is-open");
        panel.classList.toggle("astro-side-nav--open");

        if (overlay) {
          overlay.classList.toggle("astro-side-nav--open");
        }

        var open = nav.classList.contains("is-open");
        trigger.setAttribute("aria-expanded", open ? "true" : "false");
        panel.setAttribute("aria-hidden", open ? "false" : "true");
      });
    });
  </script>
</body>
</html>
